name: Import News Folder

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-folder:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Main branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone legacy repository
        run: |
          git clone --depth 1 https://github.com/k4lm3d/nsg.git legacy

      - name: Create destination directory
        run: |
          mkdir -p screenshots

      - name: Copy folder
        run: |
          rm -rf screenshots/back-and-rebuilding
          cp -R legacy/content/news/back-and-rebuilding screenshots/back-and-rebuilding/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add screenshots/back-and-rebuilding

          git commit -m "Import back-and-rebuilding folder from legacy repository" || echo "No changes to commit"

          git push origin HEAD:main
